document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* — Color — */\n  --nuva-cream: #f1ece1;       /* fondo principal blanco roto */\n  --nuva-paper: #f7f3ea;       /* fondo claro / tarjetas */\n  --nuva-white: #fbf8f1;       /* casi blanco */\n  --nuva-sage: #8a9c87;        /* verde salvia principal */\n  --nuva-sage-soft: #b8c4b2;   /* salvia claro */\n  --nuva-sage-mist: #d8dfd1;   /* salvia muy claro / bg */\n  --nuva-forest: #3d4a3d;      /* verde profundo / acento */\n  --nuva-ink: #1e231e;         /* texto principal */\n  --nuva-muted: #6b7268;       /* texto secundario */\n  --nuva-line: #cdc8b8;        /* divisores */\n  --nuva-gold: #b8956a;        /* acento cálido sutil */\n\n  /* — Tipografía — */\n  --font-display: 'Instrument Serif', 'Cormorant Garamond', Georgia, serif;\n  --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;\n\n  /* — Radios — */\n  --radius-sm: 4px;\n  --radius-md: 12px;\n  --radius-lg: 24px;\n  --radius-pill: 999px;\n\n  /* — Sombras suaves — */\n  --shadow-soft: 0 1px 2px rgba(30, 35, 30, 0.04), 0 8px 24px rgba(30, 35, 30, 0.06);\n  --shadow-deep: 0 4px 12px rgba(30, 35, 30, 0.08), 0 24px 60px rgba(30, 35, 30, 0.12);\n}\n\n/* base helpers */\n.nuva-body {\n  font-family: var(--font-body);\n  color: var(--nuva-ink);\n  background: var(--nuva-cream);\n  font-weight: 400;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  letter-spacing: 0.005em;\n}\n\n.nuva-display {\n  font-family: var(--font-display);\n  font-weight: 400;\n  line-height: 1.02;\n  letter-spacing: -0.015em;\n}\n\n.nuva-eyebrow {\n  font-family: var(--font-body);\n  font-weight: 500;\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--nuva-forest);\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--font-body);\n    color: var(--nuva-ink);\n    background: var(--nuva-cream);\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n  img { max-width: 100%; display: block; }\n  a { color: inherit; text-decoration: none; }\n\n  /* ——— NAV ——— */\n  .nav {\n    position: fixed;\n    top: 0; left: 0; right: 0;\n    z-index: 50;\n    padding: 18px 40px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    background: rgba(241,236,225,0.82);\n    backdrop-filter: saturate(140%) blur(12px);\n    -webkit-backdrop-filter: saturate(140%) blur(12px);\n    border-bottom: 1px solid transparent;\n    transition: border-color 0.3s;\n  }\n  .nav.scrolled { border-bottom-color: var(--nuva-line); }\n  .nav .brand {\n    font-family: var(--font-display);\n    font-size: 28px;\n    letter-spacing: 0.1em;\n    color: var(--nuva-ink);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .nav .brand-leaf {\n    width: 14px; height: 14px;\n    display: inline-block;\n  }\n  .nav .links {\n    display: flex; gap: 36px;\n    font-size: 13px;\n    letter-spacing: 0.04em;\n    color: var(--nuva-ink);\n  }\n  .nav .links a { transition: color 0.15s; cursor: pointer; }\n  .nav .links a:hover { color: var(--nuva-forest); }\n  .nav .cta-btn {\n    font-size: 12px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    padding: 12px 22px;\n    border-radius: 999px;\n    background: var(--nuva-ink);\n    color: var(--nuva-cream);\n    cursor: pointer;\n    border: none;\n    font-family: var(--font-body);\n    font-weight: 500;\n    transition: transform 0.15s, background 0.15s;\n  }\n  .nav .cta-btn:hover { background: var(--nuva-forest); }\n\n  @media (max-width: 760px) {\n    .nav { padding: 14px 20px; }\n    .nav .links { display: none; }\n  }\n\n  /* ——— HERO ——— */\n  .hero {\n    min-height: 100vh;\n    padding: 140px 40px 80px;\n    display: grid;\n    grid-template-columns: 1.05fr 1fr;\n    gap: 60px;\n    align-items: center;\n    max-width: 1440px;\n    margin: 0 auto;\n  }\n  .hero .eyebrow {\n    font-size: 11px;\n    letter-spacing: 0.28em izar .copy .eyebrow::before {\n    content: ''; height: 1px; width: 40px; background: rgba(251,248,241,0.5);\n  }\n  #cotizar .copy h2 {\n    font-family: var(--font-display);\n    font-size: clamp(42px, 5vw, 68px);\n    line-height: 1;\n    margin: 24px 0 28px;\n    color: var(--nuva-cream);\n    font-weight: 400;\n  }\n  #cotizar .copy h2 em { font-style: italic; color: var(--nuva-sage-mist); }\n  #cotizar .copy p {\n    color: rgba(251,248,241,0.82);\n    font-size: 16px;\n    line-height: 1.6;\n    margin: 0 0 32px;\n    max-width: 380px;\n  }\n  #cotizar .copy .perks {\n    list-style: none;\n    padding: 0; margin: 0;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  #cotizar .copy .perks li {\n    color: var(--nuva-cream);\n    font-size: 14.5px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  #cotizar .copy .perks li svg { width: 16px; flex-shrink: 0; }\n\n  /* form */\n  .form-card {\n    background: var(--nuva-cream);\n    border-radius: 8px;\n    padding: 48px;\n    color: var(--nuva-ink);\n    box-shadow: var(--shadow-deep);\n  }\n  .form-card .step-indicator {\n    display: flex; align-items: center; gap: 8px;\n    margin-bottom: 24px;\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--nuva-muted);\n  }\n  .form-card .step-indicator .dot {\n    width: 24px; height: 2px;\n    background: var(--nuva-line);\n    border-radius: 2px;\n  }\n  .form-card .step-indicator .dot.active { background: var(--nuva-forest); }\n  .form-step h3 {\n    font-family: var(--font-display);\n    font-size: 28px;\n    font-weight: 400;\n    margin: 0 0 8px;\n    line-height: 1.05;\n    color: var(--nuva-ink);\n  }\n  .form-step .sub {\n    color: var(--nuva-muted);\n    font-size: 14px;\n    margin: 0 0 24px;\n  }\n\n  .field { margin-bottom: 16px; }\n  .field label {\n    display: block;\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--nuva-muted);\n px 14px 14px 40px;\n    cursor: pointer;\n    position: relative;\n    transition: all 0.15s;\n    font-size: 13.5px;\n    color: var(--nuva-ink);\n    /* allow div to behave well on mobile */\n    -webkit-tap-highlight-color: transparent;\n    user-select: none;\n  }\n  .check-card:active { transform: scale(0.99); }\n  .check-card::before {\n    content: '';\n    position: absolute;\n    left: 14px; top: 50%; transform: translateY(-50%);\n    width: 16px; height: 16px;\n    border: 1.5px solid var(--nuva-line);\n    border-radius: 3px;\n    background: var(--nuva-cream);\n    transition: all 0.15s;\n  }\n  .check-card.selected { border-color: var(--nuva-forest); background: var(--nuva-sage-mist); }\n  .check-card.selected::before {\n    background: var(--nuva-forest);\n    border-color: var(--nuva-forest);\n  }\n  .check-card.selected::after {\n    content: '';\n    position: absolute;\n    left: 19px; top: calc(50% - 4px);\n    width: 6px; height: 10px;\n    border: solid var(--nuva-cream);\n    border-width: 0 2px 2px 0;\n    transform: rotate(45deg);\n  }\n  .form-actions {\n    display: flex; justify-content: space-between; align-items: center;\n    margin-top: 32px;\n    padding-top: 24px;\n    border-top: 1px solid var(--nuva-line);\n    gap: 12px;\n    flex-wrap: wrap;\n  }\n  .form-actions button {\n    font-family: var(--font-body);\n    font-size: 12px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    padding: 14px 28px;\n    border-radius: 999px;\n    cursor: pointer;\n    font-weight: 500;\n    border: none;\n    transition: opacity 0.15s, background 0.15s;\n    appearance: none;\n    -webkit-appearance: none;\n    -webkit-tap-highlight-color: transparent;\n  }\n  .form-actions button:active { transform: scale(0.97); }\n  .form-actions .back {\n    background: transparent;\n    color: var(--nuva-muted);\n    padding-left: 0;\n  }\n  .form-actions .back:hover { color: var(--nuva-ink); }\n  .form-actions .next {\n    background: var(--nuv      <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"service-card\">\n      <div class=\"ico\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\">\n          <path d=\"M6 8 H 18 L 17 20 H 7 Z\"><\u002Fpath>\n          <path d=\"M9 8 V 5 H 15 V 8\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div>\n        <span class=\"num\">03<\u002Fspan>\n        <h3>Reposición de insumos<\u002Fh3>\n        <p>Control y abastecimiento de productos esenciales. Jabón, papel, amenities — nos encargamos para que nunca falte nada.<\u002Fp>\n        <ul class=\"includes\">\n          <li>Inventario mensual<\u002Fli>\n          <li>Proveedores curados<\u002Fli>\n          <li>Coordinación de stock mínimo<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"service-card\">\n      <div class=\"ico\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\">\n          <path d=\"M6 9 H 18 L 16.5 20 H 7.5 Z\"><\u002Fpath>\n          <path d=\"M4 6 H 20 M 10 4 H 14 V 6\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div>\n        <span class=\"num\">04<\u002Fspan>\n        <h3>Disposición de residuos<\u002Fh3>\n        <p>Gestión responsable y segura de residuos. Separación adecuada y opción para residuos patogénicos en consultorios.<\u002Fp>\n        <ul class=\"includes\">\n          <li>Separación reciclable / patogénico<\u002Fli>\n          <li>Retiro programado<\u002Fli>\n          <li>Trazabilidad opcional<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MODALIDAD DE TRABAJO -->\n<section id=\"modalidad\" data-screen-label=\"Modalidad de trabajo\">\n  <div class=\"section-head\">\n    <div class=\"eyebrow\">Modalidad de trabajo<\u002Fdiv>\n    <div>\n      <h2>Cómo cuidamos<br>de cada <em>espacio.<\u002Fem><\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:24px\">Profesionales con cobertura legal completa, equipos propios y conciencia ecológica. La excelencia en limpieza se construye en cada detalle operativo.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"modalidad-grid\">\n    <div class=\"mod-card\">\n      <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M12 12 a 4 4 0 1 0 0 -8 4 4 0 0 0 0 8 Z M 4 21 v -2 a 6 6 0 0 1 12 0 v 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h4>Personal capacitado<\u002Fh4>\n      <p>Selección exigente y capacitación continua en seguridad, protocolo y atención al cliente. Cada integrante con identificación y uniforme.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mod-card\">\n      <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M9 12 l 2 2 4 -4 M 12 3 l 8 4 v 5 c 0 5 -3.5 8.5 -8 9 -4.5 -0.5 -8 -4 -8 -9 v -5 z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h4>Cobertura legal completa<\u002Fh4>\n      <p>ART, Seguro de Vida Obligatorio, aportes y obra social al día. Te pasamos toda la documentación cada mes.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mod-card\">\n      <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7 v 5 l 3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h4>Horarios a medida<\u002Fh4>\n      <p>Coordinamos con vos los horarios que menos interrumpan la actividad de tu espacio — antes, después o durante.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mod-card\">\n      <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M3 12 h 18 M 6 7 h 12 M 6 17 h 12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h4>Supervisión activa<\u002Fh4>\n      <p>Un supervisor coordina cada equipo y verifica que se cumplan los objetivos. Reporte fotográfico disponible.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mod-card\">\n      <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><rect x=\"4\" y=\"9\" width=\"16\" height=\"11\" rx=\"1\"><\u002Frect><path d=\"M8 9 V 6 a 4 4 0 0 1 8 0 v 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h4>Equipamiento profesional<\u002Fh4>\n      <p>Lava-fregadoras, hidrolavadoras de alta presión, aspiradoras industriales, lustradoras y equipos especializados según el espacio.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mod-card\">\n      <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M12 3 c 5 4 5 14 0 18 -5 -4 -5 -14 0 -18 z M 12 3 v 18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h4>Conciencia ecológica<\u002Fh4>\n      <p>Productos biodegradables, antitóxicos y anticorrosivos. Separación correcta de residuos y opción patogénicos para consultorios.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- AUDIENCIA -->\n<section id=\"audiencia\" data-screen-label=\"Para quién\">\n  <div class=\"section-head\">\n    <div class=\"eyebrow\">Para quién<\u002Fdiv>\n    <div>\n      <h2>Espacios que <em>no admiten<\u002Fem><br>dos lecturas.<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:24px\">Trabajamos con tres tipos de espacios donde la limpieza no es un commodity — es parte de la experiencia que ofrecés.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"audience-grid\">\n    <div class=\"audience-card\">\n      <img src=\"0e001a80-1536-4c08-a4da-6f9104a45264\" alt=\"Consultorio médico\">\n      <div class=\"content\">\n        <span class=\"num\">01<\u002Fspan>\n        <h3>Consultorios &amp;<br>clínicas<\u002Fh3>\n        <p>Higiene de grado sanitario para áreas de espera, consultorios y zonas estériles, con manejo correcto de residuos patogénicos.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"audience-card\">\n      <img src=\"4f32329f-fa1c-4aee-aaed-9a3 \"num\">ii<\u002Fspan>\n      <h4>Propuesta clara<\u002Fh4>\n      <p>Cotización detallada por escrito, con frecuencias, equipo asignado y todo lo incluido. Sin letra chica.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"process-step\">\n      <span class=\"num\">iii<\u002Fspan>\n      <h4>Servicio &amp; seguimiento<\u002Fh4>\n      <p>Visitas con checklist firmado, reporte fotográfico opcional y un coordinador dedicado al que siempre podés llamar.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DIFERENCIALES -->\n<section data-screen-label=\"Diferenciales\">\n  <div class=\"section-head\">\n    <div class=\"eyebrow\">Por qué NUUVA<\u002Fdiv>\n    <div>\n      <h2>Cuatro cosas en las que<br><em>no negociamos.<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"diffs-row\">\n    <div class=\"diff\">\n      <span class=\"num\">01<\u002Fspan>\n      <h4>Discreción absoluta<\u002Fh4>\n      <p>Equipos entrenados para operar sin interrumpir la actividad del espacio. Acuerdos de confidencialidad cuando corresponde.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"diff\">\n      <span class=\"num\">02<\u002Fspan>\n      <h4>Atención personalizada<\u002Fh4>\n      <p>Un único coordinador por cliente. Conocés a quién llamás siempre, y conocemos las particularidades de tu espacio.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"diff\">\n      <span class=\"num\">03<\u002Fspan>\n      <h4>Protocolo &amp; trazabilidad<\u002Fh4>\n      <p>Checklist firmado por visita, reporte fotográfico opcional y trazabilidad para clientes que la necesiten.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"diff\">\n      <span class=\"num\">04<\u002Fspan>\n      <h4>Productos seguros<\u002Fh4>\n      <p>Insumos hospitalarios certificados y formulaciones de bajo aroma para espacios habitados.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- COTIZAR -->\n<section id=\"cotizar\" data-screen-label=\"Cotización\">\n  <div class=\"inner\">\n    <div class=\"copy\">\n      <div class=\"eyebrow\">Cotización<\u002Fdiv>\n      <h2>Pedí una<br>cotización<br><em>sin cargo.<\u002Fem><\u002Fh2>\n      <p>Contanos sobre tu espacio y te respondemos en menos de 24hs con una propuesta a medida. La visita inicial siempre es sin cargo.<\u002Fp>\n      <ul class=\"perks\">\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 13 L 9 17 L 19 7\"><\u002Fpath><\u002Fsvg> Respuesta en menos de 24 horas<\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 13 L 9 17 L 19 7\"><\u002Fpath><\u002Fsvg> Visita y diagnóstico sin cargo<\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 13 L 9 17 L 19 7\"><\u002Fpath><\u002Fsvg> Sin contratos mínimos<\u002Fli>\n        <li><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 13 L 9 17 L 19 7\"><\u002Fpath><\u002Fsvg> Equipo dedicado a tu espacio<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"form-card\" id=\"formCard\">\n      <!-- form rendered by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"inner\">\n    <div class=\"brand-block\">\n      <div class=\"wm\">NUUVA<\u002Fdiv>\n      <p>Higiene profesional con estándar ejecutivo. Cuyo · Mendoza.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h5>Navegación<\u002Fh5>\n      <ul>\n        <li><a onclick=\"document.getElementById('servicios').scrollIntoView({behavior:'smooth'})\">Servicios<\u002Fa><\u002Fli>\n        <li><a onclick=\"document.getElementById('audiencia').scrollIntoView({behavior:'smooth'})\">Para quién<\u002Fa><\u002Fli>\n        <li><a onclick=\"document.getElementById('proceso').scrollIntoView({behavior:'smooth'})\">Proceso<\u002Fa><\u002Fli>\n        <li><a onclick=\"document.getElementById('cotizar').scrollIntoView({behavior:'smooth'})\">Co icina' ? 'selected' : ''}\" data-set=\"tipo:oficina\">\n            <div class=\"lbl\">Oficina / Obra llave en mano<\u002Fdiv>\n            <div class=\"desc\">Limpieza fina post-obra<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      `,\n      valid: () => !!form.data.tipo\n    },\n    {\n      title: '¿Qué servicios necesitás?',\n      sub: 'Podés marcar más de uno.',\n      render: () => `\n        <div class=\"checkbox-grid\">\n          ${['Limpieza Premium','Lavado de blancos','Reposición de insumos','Disposición de residuos'].map(s => `\n            <div class=\"check-card ${form.data.servicios.includes(s) ? 'selected' : ''}\" data-toggle=\"servicios:${s}\">${s}<\u002Fdiv>\n          `).join('')}\n        <\u002Fdiv>\n      `,\n      valid: () => form.data.servicios.length > 0\n    },\n    {\n      title: 'Frecuencia y tamaño',\n      sub: 'Aproximado está perfecto.',\n      render: () => `\n        <div class=\"field\">\n          <label>Frecuencia<\u002Flabel>\n          <div class=\"options-grid\">\n            ${[\n              ['unica','Visita única','Limpieza puntual'],\n              ['semanal','Semanal','Mantenimiento'],\n              ['quincenal','Quincenal','Cada 15 días'],\n            ].map(([k,l,d]) => `\n              <button type=\"button\" class=\"option-card ${form.data.frecuencia === k ? 'selected' : ''}\" data-set=\"frecuencia:${k}\">\n                <div class=\"lbl\">${l}<\u002Fdiv>\n                <div class=\"desc\">${d}<\u002Fdiv>\n              <\u002Fbutton>\n            `).join('')}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Metros cuadrados aproximados<\u002Flabel>\n          <input type=\"number\" placeholder=\"Ej: 80\" value=\"${form.data.metros}\" data-bind=\"metros\">\n        <\u002Fdiv>\n      `,\n      valid: () => !!form.data.frecuencia && !!form.data.metros\n    },\n    {\n      title: 'Tus datos',\n      sub: 'Para enviarte la propuesta.',\n      render: () => `\n        <div class=\"field\">\n          <label>Nombre y apellido<\u002Flabel>\n          <input type=\"text\" placeholder=\"Ej: María García\" value=\"${form.data.nombre}\" data-bind=\"nombre\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Email<\u002Flabel>\n          <input type=\"email\" placeholder=\"hola@email.com\" value=\"${form.data.email}\" data-bind=\"email\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Whatsapp<\u002Flabel>\n          <input type=\"tel\" placeholder=\"+54 9 11 …\" value=\"${form.data.telefono}\" data-bind=\"telefono\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Dirección o zona<\u002Flabel>\n          <input type=\"text\" placeholder=\"Ej: Chacras de Coria, Mendoza\" value=\"${form.data.direccion}\" data-bind=\"direccion\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Detalles adicionales (opcional)<\u002Flabel>\n          <textarea placeholder=\"Algo importante que debamos saber del espacio…\" data-bind=\"detalles\">${form.data.detalles}<\u002Ftextarea>\n        <\u002Fdiv>\n      `,\n      valid: () => form.data.nombre && form.data.email && form.data.telefono\n    }\n  ];\n\n  function renderForm() {\n    const card = document.getElementById('formCard');\n    if (form.step >= steps.length) {\n      card.innerHTML = `\n        <div class=\"success-state\">\n          <div class=\"check\">\n            <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 13 L 9 17 L 19 7\"/><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>¡Recibimos tu pedido!<\u002Fh3>\n          <p>Te respondemos en menos de 24 horas hábiles con la propuesta. Mientras tanto, revisamos esto:<\u002Fp>\n          <div style=\"text-align:left; margin: 32px 0 0\">\n            <div class=\"summary-line\"><span class=\"k\">Espacio<\u002Fspan><span class=\"v\">${form.data.tipo || '—'}<\u002Fspan><\u002Fdiv>\n            <div class=\"summary-line\"><span class=\"k\">Servicios<\u002Fspan><span class=\"v\">${form.data.servicios.join(', ') || '—'}<\u002Fspan><\u002Fdiv>\n            <div class=\"summary-line\"><span class=\"k\">Frecuencia<\u002Fspan><span class=\"v\">${form.data.frecuencia || '—'}<\u002Fspan><\u002Fdiv>\n            <div class=\"summary-line\"><span class=\"k\">Tamaño<\u002Fspan><span class=\"v\">${form.data.metros ? form.data.metros + ' m²' : '—'}<\u002Fspan><\u002Fdiv>\n            <div class=\"summary-line\"><span class=\"k\">Contacto<\u002Fspan><span class=\"v\">${form.data.nombre}<br>${form.data.email}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      `;\n      return;\n    }\n    const s = steps[form.step];\n    card.innerHTML = `\n      <div class=\"step-indicator\">\n        ${steps.map((_, i) => `<div class=\"dot ${i <= form.step ? 'active' : ''}\"><\u002Fdiv>`).join('')}\n        <span style=\"margin-left:8px\">Paso ${form.step + 1} de ${steps.length}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"form-step\">\n        <h3>${s.title}<\u002Fh3>\n        <p class=\"sub\">${s.sub}<\u002Fp>\n        ${s.render()}\n      <\u002Fdiv>\n      <div class=\"form-actions\">\n        <button type=\"button\" class=\"back\" ${form.step === 0 ? 'style=\"visibility:hidden\"' : ''}>← Volver<\u002Fbutton>\n        <button type=\"button\" class=\"next\" ${s.valid() ? '' : 'disabled'}>\n          ${form.step === steps.length - 1 ? 'Enviar pedido' : 'Continuar'}\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12 H 19 M 13 6 L 19 12 L 13 18\"/><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    `;\n\n    // wire events\n    card.querySelectorAll('[data-set]').forEach(el => {\n      el.addEventListener('click', () => {\n        const [k, v] = el.dataset.set.split(':');\n        form.data[k] = v;\n        renderForm();\n      });\n    });\n    card.querySelectorAll('[data-toggle]').forEach(el => {\n      el.addEventListener('click', () => {\n        const [k, v] = el.dataset.toggle.split(':');\n        const arr = form.data[k];\n        const i = arr.indexOf(v);\n        if (i >= 0) arr.splice(i, 1); else arr.push(v);\n        renderForm();\n      });\n    });\n    card.querySelectorAll('[data-bind]').forEach(el => {\n      el.addEventListener('input', () => {\n        form.data[el.dataset.bind] = el.value;\n        // only re-render next button enablement\n        const nextBtn = card.querySelector('.next');\n        if (nextBtn) nextBtn.disabled = !s.valid();\n      });\n    });\n    card.querySelector('.back')?.addEventListener('click', () => {\n      form.step--;\n      renderForm();\n    });\n    card.querySelector('.next')?.addEventListener('click', () => {\n      if (!s.valid()) return;\n      form.step++;\n      renderForm();\n    });\n  }\n\n  renderForm();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
